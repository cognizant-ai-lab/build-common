name: 'Setup Node.js Environment'
description: 'Setup Node.js with yarn via corepack and caching'
author: 'Cognizant AI Lab'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'
  package-manager:
    description: 'Package manager to use (yarn, npm, pnpm)'
    required: false
    default: 'yarn'
  working-directory:
    description: 'Working directory for installing dependencies'
    required: false
    default: '.'
  use-cache:
    description: 'Use package manager cache'
    required: false
    default: 'true'
  use-corepack:
    description: 'Enable corepack for yarn/pnpm version management'
    required: false
    default: 'true'
  clean-install:
    description: 'Clean node_modules and cache before install'
    required: false
    default: 'false'
  registry-url:
    description: 'NPM registry URL (for publishing or private packages)'
    required: false
    default: ''
  scope:
    description: 'NPM scope for registry authentication'
    required: false
    default: ''

outputs:
  node-version:
    description: 'Installed Node.js version'
    value: ${{ steps.setup-node.outputs.node-version }}
  cache-hit:
    description: 'Whether the cache was hit'
    value: ${{ steps.setup-node.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Enable corepack
      if: ${{ inputs.use-corepack == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        corepack enable
        if [ -f "package.json" ]; then
          # Install the package manager version specified in package.json
          corepack install
          echo "Package manager version:"
          if [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn --version
          elif [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm --version
          fi
        fi

    - name: Setup Node.js ${{ inputs.node-version }}
      id: setup-node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.use-cache == 'true' && inputs.package-manager || '' }}
        cache-dependency-path: ${{ inputs.working-directory }}/yarn.lock
        registry-url: ${{ inputs.registry-url }}
        scope: ${{ inputs.scope }}

    - name: Clean install (if requested)
      if: ${{ inputs.clean-install == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "Cleaning node_modules and cache..."
        rm -rf node_modules
        if [ "${{ inputs.package-manager }}" = "yarn" ]; then
          yarn cache clean --all 2>/dev/null || true
        elif [ "${{ inputs.package-manager }}" = "npm" ]; then
          npm cache clean --force 2>/dev/null || true
        elif [ "${{ inputs.package-manager }}" = "pnpm" ]; then
          pnpm store prune 2>/dev/null || true
        fi

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "Installing dependencies with ${{ inputs.package-manager }}..."
        if [ "${{ inputs.package-manager }}" = "yarn" ]; then
          yarn install
        elif [ "${{ inputs.package-manager }}" = "npm" ]; then
          npm ci
        elif [ "${{ inputs.package-manager }}" = "pnpm" ]; then
          pnpm install --frozen-lockfile
        fi

    - name: Show installed packages
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "Node.js version: $(node --version)"
        echo "Package manager: ${{ inputs.package-manager }}"
        if [ "${{ inputs.package-manager }}" = "yarn" ]; then
          echo "Yarn version: $(yarn --version)"
        elif [ "${{ inputs.package-manager }}" = "npm" ]; then
          echo "npm version: $(npm --version)"
        elif [ "${{ inputs.package-manager }}" = "pnpm" ]; then
          echo "pnpm version: $(pnpm --version)"
        fi
