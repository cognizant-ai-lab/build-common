---
name: 'Setup Python Environment'
description: >-
  Setup Python with dependencies and pip caching
author: 'Cognizant AI Lab'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  requirements-file:
    description: 'Path to requirements.txt file'
    required: false
    default: 'requirements.txt'
  requirements-build-file:
    description: >-
      Path to requirements-build.txt file
      (optional, for dev dependencies)
    required: false
    default: ''
  working-directory:
    description: 'Working directory for installing dependencies'
    required: false
    default: '.'
  use-cache:
    description: 'Use pip cache'
    required: false
    default: 'true'
  install-extras:
    description: 'Extra packages to install (space separated)'
    required: false
    default: ''

outputs:
  python-version:
    description: 'Installed Python version'
    value: ${{ steps.setup-python.outputs.python-version }}
  cache-hit:
    description: 'Whether the cache was hit'
    value: ${{ steps.setup-python.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: ${{ inputs.use-cache == 'true' && 'pip' || '' }}
        cache-dependency-path: |
          ${{ inputs.requirements-file != '' &&
            format('{0}/{1}',
              inputs.working-directory,
              inputs.requirements-file
            ) || '' }}
          ${{ inputs.requirements-build-file != '' &&
            format('{0}/{1}',
              inputs.working-directory,
              inputs.requirements-build-file
            ) || '' }}

    - name: Upgrade pip
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        python -m pip install --upgrade pip

    - name: Install dependencies from requirements file
      if: ${{ inputs.requirements-file != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_REQ_FILE: ${{ inputs.requirements-file }}
      run: |
        if [ -f "$INPUT_REQ_FILE" ]; then
          echo "Installing from ${INPUT_REQ_FILE}"
          pip install -r "$INPUT_REQ_FILE"
        else
          echo "::error::Required file ${INPUT_REQ_FILE} not found"
          exit 1
        fi

    - name: Install build dependencies
      if: ${{ inputs.requirements-build-file != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_BUILD_FILE: ${{ inputs.requirements-build-file }}
      run: |
        if [ -f "$INPUT_BUILD_FILE" ]; then
          echo "Installing build deps from ${INPUT_BUILD_FILE}"
          pip install -r "$INPUT_BUILD_FILE"
        else
          echo "::error::Required file ${INPUT_BUILD_FILE} not found"
          exit 1
        fi

    - name: Install extra packages
      if: ${{ inputs.install-extras != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_EXTRAS: ${{ inputs.install-extras }}
      run: |
        echo "Installing extra packages: ${INPUT_EXTRAS}"
        pip install $INPUT_EXTRAS

    - name: Show installed packages
      shell: bash
      run: |
        echo "Installed Python packages:"
        pip freeze
