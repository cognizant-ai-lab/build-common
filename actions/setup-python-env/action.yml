name: 'Setup Python Environment'
description: 'Setup Python with dependencies and pip caching'
author: 'Cognizant AI Lab'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  requirements-file:
    description: 'Path to requirements.txt file'
    required: false
    default: 'requirements.txt'
  requirements-build-file:
    description: 'Path to requirements-build.txt file (optional, for dev dependencies)'
    required: false
    default: ''
  working-directory:
    description: 'Working directory for installing dependencies'
    required: false
    default: '.'
  use-cache:
    description: 'Use pip cache'
    required: false
    default: 'true'
  install-extras:
    description: 'Extra packages to install (space separated)'
    required: false
    default: ''

outputs:
  python-version:
    description: 'Installed Python version'
    value: ${{ steps.setup-python.outputs.python-version }}
  cache-hit:
    description: 'Whether the cache was hit'
    value: ${{ steps.setup-python.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: ${{ inputs.use-cache == 'true' && 'pip' || '' }}
        cache-dependency-path: |
          ${{ inputs.working-directory }}/${{ inputs.requirements-file }}
          ${{ inputs.requirements-build-file != '' && format('{0}/{1}', inputs.working-directory, inputs.requirements-build-file) || '' }}

    - name: Upgrade pip
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        python -m pip install --upgrade pip

    - name: Install dependencies from requirements.txt
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f "${{ inputs.requirements-file }}" ]; then
          echo "Installing dependencies from ${{ inputs.requirements-file }}"
          pip install -r "${{ inputs.requirements-file }}"
        else
          echo "Warning: ${{ inputs.requirements-file }} not found"
        fi

    - name: Install build dependencies
      if: ${{ inputs.requirements-build-file != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f "${{ inputs.requirements-build-file }}" ]; then
          echo "Installing build dependencies from ${{ inputs.requirements-build-file }}"
          pip install -r "${{ inputs.requirements-build-file }}"
        else
          echo "Warning: ${{ inputs.requirements-build-file }} not found"
        fi

    - name: Install extra packages
      if: ${{ inputs.install-extras != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "Installing extra packages: ${{ inputs.install-extras }}"
        pip install ${{ inputs.install-extras }}

    - name: Show installed packages
      shell: bash
      run: |
        echo "Installed Python packages:"
        pip freeze
