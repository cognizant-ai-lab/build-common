name: 'Docker Buildx Push'
description: 'Build and push Docker image using buildx with GitHub Actions cache support'
author: 'Cognizant AI Lab'

inputs:
  context:
    description: 'Docker build context path'
    required: false
    default: '.'
  dockerfile:
    description: 'Path to Dockerfile'
    required: false
    default: 'Dockerfile'
  tags:
    description: 'Docker image tags (newline or comma separated)'
    required: true
  build-args:
    description: 'Docker build arguments (newline separated KEY=VALUE pairs)'
    required: false
    default: ''
  platforms:
    description: 'Target platforms for the build'
    required: false
    default: 'linux/amd64'
  push:
    description: 'Push image to registry'
    required: false
    default: 'true'
  use-cache:
    description: 'Use GitHub Actions cache for Docker layers'
    required: false
    default: 'true'
  cache-scope:
    description: 'Scope for the cache (useful for matrix builds)'
    required: false
    default: ''
  provenance:
    description: 'Generate provenance attestation'
    required: false
    default: 'false'
  sbom:
    description: 'Generate SBOM attestation'
    required: false
    default: 'false'
  secrets:
    description: 'Docker build secrets (newline separated id=value pairs)'
    required: false
    default: ''
  target:
    description: 'Docker build target stage'
    required: false
    default: ''
  quiet:
    description: 'Suppress build output'
    required: false
    default: 'false'

outputs:
  digest:
    description: 'Image digest'
    value: ${{ steps.build-push.outputs.digest }}
  imageid:
    description: 'Image ID'
    value: ${{ steps.build-push.outputs.imageid }}
  metadata:
    description: 'Build metadata'
    value: ${{ steps.build-push.outputs.metadata }}

runs:
  using: 'composite'
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Determine cache settings
      id: cache-settings
      shell: bash
      run: |
        if [ "${{ inputs.use-cache }}" = "true" ]; then
          SCOPE="${{ inputs.cache-scope }}"
          if [ -n "$SCOPE" ]; then
            echo "cache-from=type=gha,scope=$SCOPE" >> $GITHUB_OUTPUT
            echo "cache-to=type=gha,mode=max,scope=$SCOPE" >> $GITHUB_OUTPUT
          else
            echo "cache-from=type=gha" >> $GITHUB_OUTPUT
            echo "cache-to=type=gha,mode=max" >> $GITHUB_OUTPUT
          fi
        else
          echo "cache-from=" >> $GITHUB_OUTPUT
          echo "cache-to=" >> $GITHUB_OUTPUT
        fi

    - name: Build and push Docker image
      id: build-push
      uses: docker/build-push-action@v6
      env:
        BUILDKIT_PROGRESS: ${{ inputs.quiet == 'true' && 'quiet' || 'auto' }}
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        build-args: ${{ inputs.build-args }}
        platforms: ${{ inputs.platforms }}
        cache-from: ${{ steps.cache-settings.outputs.cache-from }}
        cache-to: ${{ steps.cache-settings.outputs.cache-to }}
        provenance: ${{ inputs.provenance }}
        sbom: ${{ inputs.sbom }}
        secrets: ${{ inputs.secrets }}
        target: ${{ inputs.target }}
