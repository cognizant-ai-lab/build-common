---
name: 'AWS ECR Authentication'
description: >-
  Configure AWS credentials via OIDC
  and login to Amazon ECR
author: 'Cognizant AI Lab'

inputs:
  aws-account-id:
    description: 'AWS account ID (12-digit)'
    required: true
  aws-role-name:
    description: 'IAM role name for OIDC authentication'
    required: true
  aws-region:
    description: 'AWS region for ECR'
    required: false
    default: 'us-west-2'
  role-session-name:
    description: >-
      Session name for the assumed role (optional)
    required: false
    default: 'github-actions'
  role-duration-seconds:
    description: >-
      Duration in seconds for the assumed role
      session (optional)
    required: false
    default: '3600'

outputs:
  registry:
    description: 'ECR registry URL'
    value: ${{ steps.login-ecr.outputs.registry }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs and build ARN
      id: arn
      shell: bash
      env:
        INPUT_ACCOUNT_ID: ${{ inputs.aws-account-id }}
        INPUT_ROLE_NAME: ${{ inputs.aws-role-name }}
      run: |
        ACCT_PATTERN='^[0-9]{12}$'
        if [[ ! "$INPUT_ACCOUNT_ID" =~ $ACCT_PATTERN ]]; then
          echo "::error::Invalid aws-account-id (expected 12 digits)"
          exit 1
        fi
        if [ -z "$INPUT_ROLE_NAME" ]; then
          echo "::error::aws-role-name must not be empty"
          exit 1
        fi
        ARN="arn:aws:iam::${INPUT_ACCOUNT_ID}"
        ARN="${ARN}:role/${INPUT_ROLE_NAME}"
        echo "role-arn=${ARN}" >> "$GITHUB_OUTPUT"

    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ steps.arn.outputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}
        role-session-name: ${{ inputs.role-session-name }}
        role-duration-seconds: ${{ inputs.role-duration-seconds }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
