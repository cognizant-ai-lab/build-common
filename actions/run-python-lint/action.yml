---
# Composed by _python-quality-gate.yml (the reusable
# workflow) -- see .github/workflows/ for the caller.
name: 'Run Python Lint'
description: >-
  Run formatting and linting checks with a selectable
  toolchain (ruff or legacy flake8/black/isort), plus
  optional pylint.
author: 'Cognizant AI Lab'

inputs:
  toolchain:
    description: >-
      "ruff" for ruff format --check + ruff check,
      "legacy" for flake8 (+ optional black/isort)
    required: false
    default: 'ruff'
  sources:
    description: >-
      Space-separated source directories/files to check
    required: true
  run-pylint:
    description: 'Run pylint on sources'
    required: false
    default: 'true'
  pylint-command:
    description: >-
      Custom pylint command. When empty, runs
      "pylint <sources>".
    required: false
    default: ''
  run-black-check:
    description: 'Run black --check (legacy only)'
    required: false
    default: 'false'
  run-isort-check:
    description: 'Run isort --check-only (legacy only)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: 'Ruff: format check'
      if: ${{ inputs.toolchain == 'ruff' }}
      shell: bash
      env:
        INPUT_SOURCES: ${{ inputs.sources }}
      run: >-
        "${{ github.action_path }}/scripts/ruff-format-check.sh"

    - name: 'Ruff: lint check'
      if: ${{ inputs.toolchain == 'ruff' }}
      shell: bash
      env:
        INPUT_SOURCES: ${{ inputs.sources }}
      run: >-
        "${{ github.action_path }}/scripts/ruff-lint-check.sh"

    - name: 'Legacy: flake8'
      if: ${{ inputs.toolchain == 'legacy' }}
      shell: bash
      run: flake8

    - name: 'Legacy: black --check'
      if: >-
        ${{
          inputs.toolchain == 'legacy' &&
          inputs.run-black-check == 'true'
        }}
      shell: bash
      run: black --check .

    - name: 'Legacy: isort --check-only'
      if: >-
        ${{
          inputs.toolchain == 'legacy' &&
          inputs.run-isort-check == 'true'
        }}
      shell: bash
      run: isort --check-only .

    - name: Run pylint
      if: ${{ inputs.run-pylint == 'true' }}
      shell: bash
      env:
        INPUT_PYLINT_CMD: ${{ inputs.pylint-command }}
        INPUT_SOURCES: ${{ inputs.sources }}
      run: >-
        "${{ github.action_path }}/scripts/run-pylint.sh"
