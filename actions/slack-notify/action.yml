---
name: 'Slack Notify'
description: >-
  Send Slack notification with fork detection
  to skip notifications on fork PRs
author: 'Cognizant AI Lab'

inputs:
  status:
    description: >-
      Job status (success, failure, cancelled)
    required: true
  message:
    description: >-
      Custom message to include in notification
      (optional)
    required: false
    default: ''
  webhook-url:
    description: >-
      Slack webhook URL
      (skips notification if empty/unavailable)
    required: false
    default: ''
  skip-on-fork:
    description: >-
      Skip notification for fork PRs
      (default: true)
    required: false
    default: 'true'
  mention-on-failure:
    description: >-
      Mention @channel on failure (default: false)
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Check if fork
      id: fork-check
      shell: bash
      env:
        GH_EVENT: ${{ github.event_name }}
        GH_HEAD_REPO: >-
          ${{ github.event.pull_request.head.repo.full_name }}
        GH_SELF_REPO: ${{ github.repository }}
      run: |
        if [ "$GH_EVENT" = "pull_request" ]; then
          if [ "$GH_HEAD_REPO" != "$GH_SELF_REPO" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
            echo "Detected fork PR - will be skipped"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "is_fork=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build notification payload
      id: notification
      if: >-
        ${{
          inputs.webhook-url != '' &&
          (inputs.skip-on-fork != 'true' ||
          steps.fork-check.outputs.is_fork != 'true')
        }}
      shell: bash
      env:
        INPUT_STATUS: ${{ inputs.status }}
        INPUT_MESSAGE: ${{ inputs.message }}
        INPUT_MENTION: ${{ inputs.mention-on-failure }}
        GH_REPO: ${{ github.repository }}
        GH_REF: ${{ github.ref_name }}
        GH_SERVER: ${{ github.server_url }}
        GH_RUN_ID: ${{ github.run_id }}
        GH_WORKFLOW: ${{ github.workflow }}
        GH_ACTOR: ${{ github.actor }}
      run: |
        case "$INPUT_STATUS" in
          success)
            EMOJI="white_check_mark"
            COLOR="good"
            STATUS_TEXT="Passed"
            ;;
          failure)
            EMOJI="x"
            COLOR="danger"
            STATUS_TEXT="Failed"
            ;;
          cancelled)
            EMOJI="warning"
            COLOR="warning"
            STATUS_TEXT="Cancelled"
            ;;
          *)
            EMOJI="grey_question"
            COLOR="#808080"
            STATUS_TEXT="$INPUT_STATUS"
            ;;
        esac

        if [ -n "$INPUT_MESSAGE" ]; then
          MESSAGE="$INPUT_MESSAGE"
        else
          MESSAGE="$STATUS_TEXT"
        fi

        MENTION=""
        if [ "$INPUT_STATUS" = "failure" ] && \
           [ "$INPUT_MENTION" = "true" ]; then
          MENTION="<!channel> "
        fi

        RUN_URL="${GH_SERVER}/${GH_REPO}"
        RUN_URL="${RUN_URL}/actions/runs/${GH_RUN_ID}"

        PAYLOAD=$(jq --null-input \
          --arg color "$COLOR" \
          --arg mention "$MENTION" \
          --arg emoji "$EMOJI" \
          --arg message "$MESSAGE" \
          --arg repo "$GH_REPO" \
          --arg ref "$GH_REF" \
          --arg run_url "$RUN_URL" \
          --arg workflow "$GH_WORKFLOW" \
          --arg actor "$GH_ACTOR" \
          '{
            "attachments": [
              {
                "color": $color,
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": (
                        $mention + ":" + $emoji
                        + ": *" + $message
                        + "* for `" + $repo
                        + "` on `" + $ref
                        + "`\n<" + $run_url
                        + "|View build run>"
                      )
                    }
                  },
                  {
                    "type": "context",
                    "elements": [
                      {
                        "type": "mrkdwn",
                        "text": (
                          "Workflow: " + $workflow
                          + " | Triggered by: "
                          + $actor
                        )
                      }
                    ]
                  }
                ]
              }
            ]
          }')

        echo "payload<<PAYLOAD_EOF" >> "$GITHUB_OUTPUT"
        echo "$PAYLOAD" >> "$GITHUB_OUTPUT"
        echo "PAYLOAD_EOF" >> "$GITHUB_OUTPUT"

    - name: Send Slack notification
      if: >-
        ${{
          inputs.webhook-url != '' &&
          (inputs.skip-on-fork != 'true' ||
          steps.fork-check.outputs.is_fork != 'true')
        }}
      # v2.1.1
      uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a
      with:
        webhook: ${{ inputs.webhook-url }}
        webhook-type: incoming-webhook
        payload: >-
          ${{ steps.notification.outputs.payload }}
