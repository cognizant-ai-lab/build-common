name: 'Slack Notify'
description: 'Send Slack notification with fork detection to skip notifications on fork PRs'
author: 'Cognizant AI Lab'

inputs:
  status:
    description: 'Job status (success, failure, cancelled)'
    required: true
  message:
    description: 'Custom message to include in notification (optional)'
    required: false
    default: ''
  webhook-url:
    description: 'Slack webhook URL'
    required: true
  channel:
    description: 'Slack channel to post to (optional, uses webhook default if not specified)'
    required: false
    default: ''
  skip-on-fork:
    description: 'Skip notification for fork PRs (default: true)'
    required: false
    default: 'true'
  mention-on-failure:
    description: 'Mention @channel on failure (default: false)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Check if fork
      id: fork-check
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "is_fork=true" >> $GITHUB_OUTPUT
            echo "Detected fork PR - notifications will be skipped"
          else
            echo "is_fork=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "is_fork=false" >> $GITHUB_OUTPUT
        fi

    - name: Determine notification details
      id: notification
      if: ${{ inputs.skip-on-fork != 'true' || steps.fork-check.outputs.is_fork != 'true' }}
      shell: bash
      run: |
        # Determine emoji and color based on status
        case "${{ inputs.status }}" in
          success)
            EMOJI="white_check_mark"
            COLOR="good"
            STATUS_TEXT="Passed"
            ;;
          failure)
            EMOJI="x"
            COLOR="danger"
            STATUS_TEXT="Failed"
            ;;
          cancelled)
            EMOJI="warning"
            COLOR="warning"
            STATUS_TEXT="Cancelled"
            ;;
          *)
            EMOJI="grey_question"
            COLOR="#808080"
            STATUS_TEXT="${{ inputs.status }}"
            ;;
        esac
        
        echo "emoji=$EMOJI" >> $GITHUB_OUTPUT
        echo "color=$COLOR" >> $GITHUB_OUTPUT
        echo "status_text=$STATUS_TEXT" >> $GITHUB_OUTPUT
        
        # Build message
        if [ -n "${{ inputs.message }}" ]; then
          MESSAGE="${{ inputs.message }}"
        else
          MESSAGE="$STATUS_TEXT"
        fi
        echo "message=$MESSAGE" >> $GITHUB_OUTPUT
        
        # Add mention if requested on failure
        MENTION=""
        if [ "${{ inputs.status }}" = "failure" ] && [ "${{ inputs.mention-on-failure }}" = "true" ]; then
          MENTION="<!channel> "
        fi
        echo "mention=$MENTION" >> $GITHUB_OUTPUT

    - name: Send Slack notification
      if: ${{ inputs.skip-on-fork != 'true' || steps.fork-check.outputs.is_fork != 'true' }}
      uses: slackapi/slack-github-action@v2.0.0
      with:
        webhook: ${{ inputs.webhook-url }}
        webhook-type: incoming-webhook
        payload: |
          {
            "attachments": [
              {
                "color": "${{ steps.notification.outputs.color }}",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "${{ steps.notification.outputs.mention }}:${{ steps.notification.outputs.emoji }}: *${{ steps.notification.outputs.message }}* for `${{ github.repository }}` on `${{ github.ref_name }}`"
                    }
                  },
                  {
                    "type": "context",
                    "elements": [
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run> | Triggered by: ${{ github.actor }}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
