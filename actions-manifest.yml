---
# Actions Manifest for build-common
#
# Single source of truth for all third-party GitHub Actions
# used across workflows and composite actions in this repo.
#
# Fields:
#   action   - GitHub action reference (owner/repo)
#   version  - Human-readable version tag
#   sha      - Pinned commit SHA used in workflow files
#   node     - Action runtime (node24, docker, etc.)
#   used_in  - Files that reference this action
#
# Maintainers: update this file whenever an action version
# is changed, then run scripts/sync_actions_manifest.py to
# patch the workflow files.  Run a periodic review to ensure
# all SHAs still point to the latest patch of their major
# version.

actions:
