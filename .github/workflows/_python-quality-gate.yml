name: Python Quality Gate

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.12'
      working-directory:
        description: 'Working directory for the project'
        required: false
        type: string
        default: '.'
      requirements-file:
        description: 'Path to requirements.txt'
        required: false
        type: string
        default: 'requirements.txt'
      requirements-build-file:
        description: 'Path to requirements-build.txt (optional)'
        required: false
        type: string
        default: ''
      source-directory:
        description: 'Source directory to lint/test'
        required: false
        type: string
        default: '.'
      run-pylint:
        description: 'Run pylint'
        required: false
        type: boolean
        default: true
      run-flake8:
        description: 'Run flake8'
        required: false
        type: boolean
        default: true
      run-pytest:
        description: 'Run pytest'
        required: false
        type: boolean
        default: true
      run-shellcheck:
        description: 'Run shellcheck on shell scripts'
        required: false
        type: boolean
        default: false
      pytest-args:
        description: 'Additional pytest arguments'
        required: false
        type: string
        default: ''
      pylint-args:
        description: 'Additional pylint arguments'
        required: false
        type: string
        default: ''
      flake8-args:
        description: 'Additional flake8 arguments'
        required: false
        type: string
        default: ''
    secrets:
      SLACK_WEBHOOK_URL:
        description: 'Slack webhook URL for notifications'
        required: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: cognizant-ai-lab/build-common/actions/setup-python-env@main
        with:
          python-version: ${{ inputs.python-version }}
          requirements-file: ${{ inputs.requirements-file }}
          requirements-build-file: ${{ inputs.requirements-build-file }}
          working-directory: ${{ inputs.working-directory }}

      - name: Run pylint
        if: ${{ inputs.run-pylint }}
        working-directory: ${{ inputs.working-directory }}
        run: |
          pylint ${{ inputs.source-directory }} ${{ inputs.pylint-args }}

      - name: Run flake8
        if: ${{ inputs.run-flake8 }}
        working-directory: ${{ inputs.working-directory }}
        run: |
          flake8 ${{ inputs.source-directory }} ${{ inputs.flake8-args }}

      - name: Run shellcheck
        if: ${{ inputs.run-shellcheck }}
        working-directory: ${{ inputs.working-directory }}
        run: |
          find . -name "*.sh" -type f | xargs shellcheck --severity=warning

      - name: Notify Slack on failure
        if: failure()
        uses: cognizant-ai-lab/build-common/actions/slack-notify@main
        with:
          status: failure
          message: 'Lint checks failed'
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ inputs.run-pytest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: cognizant-ai-lab/build-common/actions/setup-python-env@main
        with:
          python-version: ${{ inputs.python-version }}
          requirements-file: ${{ inputs.requirements-file }}
          requirements-build-file: ${{ inputs.requirements-build-file }}
          working-directory: ${{ inputs.working-directory }}

      - name: Run pytest
        working-directory: ${{ inputs.working-directory }}
        run: |
          pytest ${{ inputs.pytest-args }}

      - name: Notify Slack on failure
        if: failure()
        uses: cognizant-ai-lab/build-common/actions/slack-notify@main
        with:
          status: failure
          message: 'Tests failed'
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    steps:
      - name: Notify Slack on success
        uses: cognizant-ai-lab/build-common/actions/slack-notify@main
        with:
          status: success
          message: 'Python quality gate passed'
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
