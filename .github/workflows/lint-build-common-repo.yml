---
name: Lint build-common repo

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint YAML and GitHub Actions
    runs-on: ubuntu-latest
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install yamllint
        shell: bash
        run: |
          pip install yamllint

      - name: Run yamllint
        shell: bash
        run: |
          yamllint --strict .github/workflows/ actions/

      - name: Install actionlint
        if: success() || failure()
        shell: bash
        env:
          ACTIONLINT_VERSION: ${{ vars.ACTIONLINT_VERSION }}
        run: |
          .github/workflows/scripts/install-actionlint.sh \
            "$ACTIONLINT_VERSION"

      # actionlint only understands workflow files, not composite
      # action metadata (action.yml). The actions/ directory is
      # covered by yamllint for YAML syntax validation instead.
      - name: Run actionlint
        if: success() || failure()
        shell: bash
        run: |
          actionlint -color \
            .github/workflows/*.yml


  python-quality-gate:
    name: Python Quality Gate
    uses: ./.github/workflows/_python-quality-gate.yml
    with:
      sources: scripts
      run-pylint: false
      run-pytest: true
      run-shellcheck: false
      enable-slack: false
      build-common-ref: ${{ github.head_ref || github.ref_name }}

  manifest-check:
    name: Check actions manifest
    runs-on: ubuntu-latest
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install dependencies
        shell: bash
        run: |
          pip install --requirement requirements.txt

      - name: Validate actions manifest
        shell: bash
        run: |
          scripts/check-actions-manifest.py
