---
name: Lint build-common repo

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint on reusable workflows
        run: >-
          docker run --rm
          --volume "${{ github.workspace }}:/repo"
          --workdir /repo
          rhysd/actionlint:1.7.11
          -color
          .github/workflows/*.yml


  yamllint:
    name: Lint YAML syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        shell: bash
        run: |
          pip install yamllint

      - name: Run yamllint
        shell: bash
        run: |
          yamllint --strict .github/workflows/ actions/
