---
name: Lint build-common repo

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        shell: bash
        env:
          ACTIONLINT_VERSION: ${{ vars.ACTIONLINT_VERSION || '1.7.11' }}
        run: |
          .github/workflows/scripts/install-actionlint.sh \
            "$ACTIONLINT_VERSION"

      - name: Run actionlint on reusable workflows
        shell: bash
        run: |
          actionlint -color .github/workflows/*.yml


  yamllint:
    name: Lint YAML syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        shell: bash
        run: |
          pip install yamllint

      - name: Run yamllint
        shell: bash
        run: |
          yamllint --strict .github/workflows/ actions/
