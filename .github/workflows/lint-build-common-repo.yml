---
name: Lint build-common repo

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  yamllint:
    name: Lint YAML syntax
    runs-on: ubuntu-latest
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install yamllint
        shell: bash
        run: |
          pip install yamllint

      - name: Run yamllint
        shell: bash
        run: |
          yamllint --strict .github/workflows/ actions/


  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install actionlint
        shell: bash
        env:
          ACTIONLINT_VERSION: ${{ vars.ACTIONLINT_VERSION }}
        run: |
          .github/workflows/scripts/install-actionlint.sh \
            "$ACTIONLINT_VERSION"

      # actionlint only understands workflow files, not composite
      # action metadata (action.yml). The actions/ directory is
      # covered by yamllint for YAML syntax validation instead.
      - name: Run actionlint
        shell: bash
        run: |
          actionlint -color \
            .github/workflows/*.yml


  manifest-check:
    name: Check actions manifest
    runs-on: ubuntu-latest
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install PyYAML
        shell: bash
        run: |
          pip install pyyaml

      - name: Validate actions manifest
        shell: bash
        run: |
          scripts/check-actions-manifest.sh
